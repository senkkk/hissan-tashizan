<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ヒッサン・コレクターズ</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="game-title">
        <div>
          <p class="eyebrow">2桁の繰り上がり筆算バトル</p>
          <h1 id="game-title">ヒッサン・コレクターズ</h1>
          <p class="lead">
            2桁＋2桁の筆算を10問クリアすると、ふしぎな「けいさんモンスター」をゲット！
            何度も挑戦して図鑑コンプリートを目指そう。
          </p>
        </div>
        <div class="hero-card" aria-label="今回の挑戦状況">
          <span class="hero-card__label">今回のクリア数</span>
          <strong><span id="streak-count">0</span>/10</strong>
          <small>10問正解でゲットチャンス</small>
        </div>
      </section>

      <section class="layout-grid">
        <article class="panel game-panel" aria-labelledby="problem-title">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Challenge</p>
              <h2 id="problem-title">筆算問題</h2>
            </div>
            <button id="new-problem-button" class="ghost-button" type="button">問題をかえる</button>
          </div>

          <div class="math-card" aria-live="polite">
            <div class="vertical-sum" aria-label="2桁同士の足し算">
              <div class="carry-row">
                <span id="carry-tens" class="carry-slot">&nbsp;</span>
                <span id="carry-ones" class="carry-slot">&nbsp;</span>
              </div>
              <div class="number-row"><span id="addend-a-tens">0</span><span id="addend-a-ones">0</span></div>
              <div class="number-row plus-row"><span class="plus-sign">+</span><span id="addend-b-tens">0</span><span id="addend-b-ones">0</span></div>
              <div class="answer-line" aria-hidden="true"></div>
            </div>

            <form id="answer-form" class="answer-form">
              <label for="answer-input">答えを入力</label>
              <div class="answer-row">
                <input id="answer-input" name="answer" type="number" min="20" max="198" inputmode="numeric" autocomplete="off" required />
                <button class="primary-button" type="submit">こたえる</button>
              </div>
              <p id="feedback" class="feedback" role="status">答えを入れて「こたえる」を押してね。</p>
            </form>
          </div>

          <div class="progress-wrap" aria-label="10問クリアまでの進捗">
            <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
            <p>あと <strong id="remaining-count">10</strong> 問でゲットチャンス！</p>
          </div>
        </article>

        <aside class="panel reward-panel" aria-labelledby="reward-title">
          <p class="eyebrow">Reward</p>
          <h2 id="reward-title">ゲットしたキャラクター</h2>
          <div id="last-reward" class="last-reward empty">
            <div class="monster-emoji" aria-hidden="true">?</div>
            <p>まだキャラクターはいません。10問クリアして仲間を見つけよう！</p>
          </div>
          <button id="reset-run-button" class="ghost-button full" type="button">今回の挑戦をリセット</button>
        </aside>
      </section>

      <section class="panel dex-panel" aria-labelledby="dex-title">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Collection</p>
            <h2 id="dex-title">けいさんモンスター図鑑</h2>
          </div>
          <div class="dex-count"><span id="owned-count">0</span>/<span id="total-count">0</span> 発見</div>
        </div>
        <div id="dex-grid" class="dex-grid" aria-live="polite"></div>
        <button id="reset-dex-button" class="danger-button" type="button">図鑑データをリセット</button>
      </section>
    </main>

    <div id="reward-modal" class="modal" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <p class="eyebrow">Get!</p>
        <div id="modal-emoji" class="monster-emoji big" aria-hidden="true">🐣</div>
        <h2 id="modal-title">新しい仲間をゲット！</h2>
        <p id="modal-description"></p>
        <button id="close-modal-button" class="primary-button" type="button">図鑑に登録する</button>
      </div>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
